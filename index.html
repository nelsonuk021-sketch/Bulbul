<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#131A37,#0CB17C);
    }

    .card{
        background:#fff;
        padding:40px;
        border-radius:20px;
        text-align:center;
        width:350px;
        box-shadow:0 10px 30px rgba(0,0,0,.2);
    }

    .card h1{
        color:#131A37;
        margin-bottom:10px;
        font-size:32px;
    }

    .card p{
        color:#666;
        margin-bottom:25px;
    }

    .btn{
        display:inline-block;
        padding:12px 25px;
        background:#0CB17C;
        color:#fff;
        text-decoration:none;
        border-radius:30px;
        transition:.3s;
    }

    .btn:hover{
        background:#089364;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Welcome 👋</h1>
    <p>We're glad to have you here. Start exploring now.</p>
    <a href="#" class="btn">Get Started</a>
</div>

</body>
</html>
